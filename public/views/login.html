<!doctype html>
<html lang="it">
<head>
  <base href="/views/">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoStrava — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <div class="brand">
        <i data-lucide="activity" class="brand-icon-sm icon-accent-green" aria-hidden></i>
        <span class="brand-text">EcoStrava</span>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Back</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="auth-wrapper">
      <div class="auth-card" role="region" aria-label="Login form">
        <h1 class="auth-title">Welcome back</h1>
        <div class="auth-sub">Sign in to your account</div>

        <form id="login-form" action="#" method="post">
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input id="email" name="email" type="email" class="form-input" placeholder="name@example.com" required>
          </div>

          <div class="form-group">
            <div class="form-row">
              <label class="form-label" for="password">Password</label>
              <a href="#" class="forgot">Forgot password?</a>
            </div>
            <div class="input-wrap">
              <input id="password" name="password" type="password" class="form-input" placeholder="••••••••" required>
              <button type="button" aria-label="Show password" title="Show password" class="eye">
                <span class="material-icons">visibility</span>
              </button>
            </div>
          </div>

          <button type="submit" class="sign-btn">Sign in</button>
        </form>

        <div id="form-error" class="form-error" aria-live="polite"></div>

        <div class="small-muted">No account? <a href="register.html" class="create-link">Create one</a></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <strong>EcoStrava</strong></div>
      <nav class="footer-nav">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
      </nav>
    </div>
  </footer>
  
  <script src="../assets/js/login.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
